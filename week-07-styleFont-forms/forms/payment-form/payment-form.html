<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Form</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <form>
    <h1>Payment Form</h1>
    <p>Please complete all required (*) fields.</p>

    <section>
      <h2>Contact information</h2>
      <fieldset>
        <legend>Title</legend>
        <ul>
          <li>
            <label for="title_1">Ace</label>
            <input type="radio" name="title" id="title_1" value="A">
          </li>
          <li>
            <label for="title_2">King</label>
            <input type="radio" name="title" id="title_2" value="K"> 
          </li>
          <li>
            <label for="title_3">Queen</label>
            <input type="radio" name="title" id="title_3" value="Q">
          </li>
        </ul>
      </fieldset>
      <p>
        <label for="name">Name *:</label>
        <input type="text" name="username" id="name" required>
      </p>
      <p>
        <label for="mail"><span>Email *:</span></label>
        <input type="email" name="user-mail" id="mail" required>
      </p>
      <p>
        <label for="pwd">Password *:</label>
        <input type="password" name="password" id="pwd" required>
      </p>
    </section>

    <section>
      <h2>Payment information</h2>
      <p>
        <label for="card">
          <span>Card type:</span>
        </label>
        <select name="user-card" id="card">
          <option value="visa">Visa</option>
          <option value="mc">Mastercard</option>
          <option value="amex">American Express</option>
        </select>
      </p>
      <p>
        <label for="number">Card number *:</label>
        <input type="tel" name="card-number" id="number" required>
      </p>
      <p>
        <label for="expiration">Expiration date *:</label>
        <input type="text"
          name="expiration"
          id="expiration"
          required
          placeholder="MM/YY"
          pattern="^(0[1-9]|1[0-2])\/([0-9]{2})$"/>
      </p>
    </section>
    <section>
      <p>
        <button type="submit">Validate the Payment</button>
      </p>
    </section>

  </form>
</body>
</html>
