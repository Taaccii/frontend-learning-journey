<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Basic Form</title>
  <style>
    
    body {
      text-align: center;
    }

    form {
      display: inline-block;
      padding: 1em;
      border: 1px solid #ccc;
      border-radius: 1em;
    }

    p + p { 
      margin-top: 1em;
    }

    label {
      display: inline-block;
      min-width: 90px;
      text-align: right;
    }

    input,
    textarea {
      font: 1em sans-serif;
      width: 300px;
      box-sizing: border-box;
      border: 1px solid #999;
      outline-color: black;
    }

    input:focus,
    textarea:focus {
      outline-style: solid;
    }


    textarea {
      vertical-align: top;
      height: 5em;
    }

    .button {
      padding-left: 90px;
    }

    button {
      margin-left: 0.5em;
    }
  </style>
</head>
<body>

  <form action="/my-handling-form-page" method="post">
    <p>
      <label for="name">Name:</label>
      <input type="text" name="user_name" id="name">
    </p>
    <p>
      <label for="mail">Email:</label>
      <input type="email" name="user_email" id="mail">
    </p>
    <p>
      <label for="Message">Message:</label>
      <textarea name="user_message" id="msg">Write some text</textarea>
    </p>
    
    <p class="button">
      <button type="submit">Send Your Message</button>
    </p>

  </form>
</body>
</html>
